# ═══════════════════════════════════════════════════════════════
# TEMPLATE — Red Teaming Campaign
# ═══════════════════════════════════════════════════════════════
#
# A campaign = one target + a list of attacks from the catalog.
# Each attack is a path to a YAML file.
#
# Usage:
#   python main.py examples/campaigns/my_campaign/campaign.yaml
#
# Copy this file into a new campaign folder and fill in the fields.
# ═══════════════════════════════════════════════════════════════

# ── Metadata (optional) ──────────────────────────────────────
campaign:
  name: "REPLACE — Campaign name"
  description: >
    REPLACE — Description of what this campaign tests.

# ── Target to attack ─────────────────────────────────────────
target:
  name: "REPLACE — Human-readable target name"         # e.g. "CustomerBot SIA"
  model: "REPLACE — Model name"                        # e.g. "gpt-4.1", "llama3.1", "customerbot-v2"
  architecture_type: "REPLACE — Architecture type"     # e.g. "Bare chatbot", "RAG-connected bot"
  chat_url: "http://localhost:8000/api/chat"            # HTTP endpoint that receives prompts
  reset_memory_url: "http://localhost:8000/api/reset"   # optional (if the target keeps context)
  input_field: "prompt"                                 # input string field name
  output_field: "response"                              # output JSON field name

# ── Attacks to execute (in order) ────────────────────────────
# Each line is a path to an attack YAML file.
# Paths are relative to the project root.
attacks:
  - examples/attacks/R1-prompt-leakage/REPLACE.yaml
  - examples/attacks/R1-prompt-leakage/REPLACE.yaml
  - examples/attacks/R3-jailbreaking-guardrail-bypass/REPLACE.yaml
  # Add as many attacks as needed...
